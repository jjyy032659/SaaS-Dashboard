#===============================================================================
# CONTINUOUS DEPLOYMENT (CD) WORKFLOW
#===============================================================================
#
# FLOW:
#   git push main
#     → CI passes (ci.yml)
#     → CD runs (this file):
#         1. Build Docker image
#         2. Push to AWS ECR
#         3. SSH into EC2 and run deploy.sh
#
# REQUIRED GITHUB SECRETS:
# ─────────────────────────────────────────────────────────────────────────────
# AWS credentials (for pushing to ECR):
#   AWS_ACCESS_KEY_ID        — IAM user access key
#   AWS_SECRET_ACCESS_KEY    — IAM user secret key
#   AWS_REGION               — e.g. us-east-1
#   AWS_ACCOUNT_ID           — your 12-digit AWS account ID
#
# EC2 SSH (for triggering deploy):
#   EC2_HOST                 — your EC2 Elastic IP (from: terraform output elastic_ip)
#   EC2_SSH_KEY              — contents of your .pem file (the full private key)
#
# App build-time env vars:
#   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
#   NEXT_PUBLIC_APP_URL
#
# How to find your values:
#   AWS_ACCOUNT_ID  → AWS Console > top-right account menu, or: aws sts get-caller-identity
#   AWS_REGION      → the region you ran terraform apply in (check terraform.tfvars)
#   ECR repo URL    → terraform output ecr_repository_url
#   EC2_HOST        → terraform output elastic_ip
#   EC2_SSH_KEY     → contents of the .pem file used in var.key_pair_name
#
# Add secrets at: GitHub repo → Settings → Secrets and variables → Actions
#===============================================================================

name: CD — Build, Push to ECR & Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

#===============================================================================
# GLOBAL ENV VARS
#===============================================================================
# ECR URL format: {account_id}.dkr.ecr.{region}.amazonaws.com/{repo_name}
# The repo name matches var.project_name in your Terraform (default: my-saas-dashboard)
env:
  ECR_REPOSITORY: my-saas-dashboard   # Must match var.project_name in terraform.tfvars

jobs:

  #=============================================================================
  # JOB 1: BUILD & PUSH TO ECR
  #=============================================================================
  build-and-push:
    name: Build & Push to AWS ECR
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      #---------------------------------------------------------------------------
      # STEP: Configure AWS credentials
      #---------------------------------------------------------------------------
      # This lets GitHub Actions authenticate with your AWS account.
      # Uses the IAM user credentials stored in GitHub Secrets.
      #
      # The IAM user needs these permissions:
      #   ecr:GetAuthorizationToken
      #   ecr:BatchCheckLayerAvailability
      #   ecr:GetDownloadUrlForLayer
      #   ecr:BatchGetImage
      #   ecr:InitiateLayerUpload
      #   ecr:UploadLayerPart
      #   ecr:CompleteLayerUpload
      #   ecr:PutImage
      #
      # See: AWS Console → IAM → Users → your-user → Permissions
      #---------------------------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      #---------------------------------------------------------------------------
      # STEP: Log in to Amazon ECR
      #---------------------------------------------------------------------------
      # Gets a temporary auth token (valid 12h) and logs Docker into ECR.
      # The "registry" output gives us the ECR base URL for tagging images.
      #---------------------------------------------------------------------------
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      #---------------------------------------------------------------------------
      # STEP: Generate image tag
      #---------------------------------------------------------------------------
      # Tag format: sha-{short-commit} (e.g. sha-a1b2c3d)
      # This makes every image uniquely traceable to its source commit.
      # We also tag :latest to always point at the most recent build.
      #---------------------------------------------------------------------------
      - name: Generate image tag
        id: set-tag
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      #---------------------------------------------------------------------------
      # STEP: Build & push Docker image to ECR
      #---------------------------------------------------------------------------
      # Builds your Dockerfile and pushes two tags to ECR:
      #   :latest     — always points to the newest image
      #   :sha-abc123 — immutable, tied to this exact commit (use for rollbacks)
      #
      # Layer caching: GitHub Actions cache is used to avoid rebuilding unchanged
      # layers. This turns ~4min builds into ~45sec for small changes.
      #---------------------------------------------------------------------------
      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEXT_PUBLIC_* variables must be baked in at build time
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Print image summary
        run: |
          echo "## Docker Image Pushed to ECR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ steps.login-ecr.outputs.registry }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** \`${{ env.ECR_REPOSITORY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.set-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY

  #=============================================================================
  # JOB 2: DEPLOY TO EC2
  #=============================================================================
  # Runs AFTER the image is successfully pushed to ECR.
  # SSHs into your EC2 instance and runs /opt/app/deploy.sh which:
  #   1. Logs into ECR (refreshes the 12h token)
  #   2. Pulls the new image
  #   3. Restarts the container via docker compose
  #=============================================================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push   # Only deploy if the image was pushed successfully

    steps:
      #---------------------------------------------------------------------------
      # STEP: SSH into EC2 and run deploy.sh
      #---------------------------------------------------------------------------
      # appleboy/ssh-action connects to your EC2 instance and runs the script.
      #
      # EC2_HOST    → your Elastic IP (terraform output elastic_ip)
      # EC2_SSH_KEY → the full contents of your .pem key file
      #              (copy-paste the entire file including -----BEGIN/END-----)
      #
      # deploy.sh is already on your server at /opt/app/deploy.sh (set up by
      # Terraform user-data.sh). It accepts an image tag as the first argument.
      #
      # We pass the commit SHA tag so the server pulls the exact image we just built.
      #---------------------------------------------------------------------------
      - name: Deploy new image on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/app
            ./deploy.sh ${{ needs.build-and-push.outputs.image-tag }}

      - name: Print deploy summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Server:** \`${{ secrets.EC2_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image tag deployed:** \`${{ needs.build-and-push.outputs.image-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To rollback, SSH into EC2 and run:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "cd /opt/app && ./deploy.sh <previous-sha-tag>" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
